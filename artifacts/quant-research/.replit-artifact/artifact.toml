kind = "web"
previewPath = "/"
title = "Quant Research Platform"
version = "1.0.0"
id = "artifacts/quant-research"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18184

[services.development]
run = "pnpm --filter @workspace/quant-research run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quant-research", "run", "build" ]
publicDir = "artifacts/quant-research/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18184"
BASE_PATH = "/"
